name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Instalar dependencias de desarrollo
        run: python -m pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Instalar dependencias de runtime usadas por los módulos con test
        # Subconjunto de requirements.txt: solo lo que importan los módulos
        # cubiertos por tests/ (funciones puras). El resto del pipeline
        # (pysheds, cfgrib/eccodes, herbie-data, osmnx, folium, …) depende de
        # datos y librerías pesadas que tests/ deliberadamente no ejercita.
        run: python -m pip install "numpy>=1.26" "pandas>=2.0" "rasterio>=1.3" "geopandas>=0.14" "shapely>=2.0" "PyYAML>=6.0" "requests>=2.31"

      - name: Tests con cobertura
        run: pytest --cov --cov-report=term-missing

      - name: Actualizar badge de cobertura
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          python -m pip install coverage-badge
          coverage-badge -o docs/coverage.svg -f
          if ! git diff --quiet -- docs/coverage.svg; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/coverage.svg
            git commit -m "Actualiza badge de cobertura [skip ci]"
            git push
          fi

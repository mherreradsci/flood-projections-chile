# Configuración del sistema de proyección de anegamientos — Región de Coquimbo
proyecto:
  nombre: anegamientos-coquimbo

region:
  nombre: "Región de Coquimbo"
  osm_geocode: "Región de Coquimbo, Chile"
  # id (opcional): subcarpeta por región dentro de data/ y outputs/, para que
  # varias regiones convivan en el mismo checkout. Para una región nueva:
  # copiar este archivo (p. ej. config_atacama.yaml), definir id, nombre,
  # osm_geocode y bbox, redefinir calibracion.eventos con huellas locales, y
  # correr los scripts con --config config_atacama.yaml.
  # Coquimbo queda sin id mientras el cron use el layout plano histórico
  # (activarlo obliga a mover data/* y outputs/* a data/<id>/ y outputs/<id>/).
  # id: coquimbo
  # bbox de respaldo/recorte [oeste, sur, este, norte] (EPSG:4326)
  bbox: [-72.0, -32.5, -69.75, -28.9]

rutas:
  data: data
  outputs: outputs

mapa:
  # Vista inicial del HTML [lat, lon] + zoom; comentar el bloque para volver
  # al comportamiento por defecto (centro del bbox regional, zoom 8).
  vista_inicial:
    centro: [-29.945, -71.28]   # conurbación La Serena–Coquimbo
    zoom: 12

dem:
  # 90 m para la corrida regional completa; usar 30 para análisis por cuenca
  resolucion_m: 90

terreno:
  # área de acumulación mínima (km²) para que una celda se considere cauce
  umbral_drenaje_km2: 15
  # HAND máximo considerado inundable (m sobre el drenaje más cercano)
  hand_max_m: 15

subcuencas:
  hydrobasins_nivel: 8

modelo:
  # Curve Number por clase ESA WorldCover (condición AMC II, suelos
  # hidrológicos tipo C, típicos de la zona árida-semiárida de Coquimbo).
  # La calibración ajusta un factor de volumen por subcuenca, por lo que
  # estos valores son el punto de partida, no el resultado final.
  cn_por_worldcover:
    10: 70    # bosque
    20: 77    # matorral
    30: 79    # pastizal
    40: 81    # cultivos
    50: 92    # urbano / construido
    60: 86    # suelo desnudo / vegetación escasa
    70: 98    # nieve y hielo
    80: 100   # agua permanente
    90: 85    # humedal herbáceo
    95: 85    # manglar
    100: 80   # musgo y liquen
  cn_defecto: 82
  # banda bajo la isoterma 0 donde la nieve húmeda no genera escorrentía líquida plena
  banda_nieve_humeda_m: 300
  factor_volumen_defecto: 1.0

pronostico:
  modelo: gfs        # gfs | ifs (ECMWF open-data 0.25°)
  producto: pgrb2.0p25
  horas: 72          # horizonte de acumulación (h)
  # si el GRIB no trae altura de isoterma 0 utilizable, respaldo:
  isoterma0_defecto_m: 3000

sentinel1:
  # openEO en Copernicus Dataspace (cuenta gratuita: dataspace.copernicus.eu)
  backend: "openeo.dataspace.copernicus.eu"
  coleccion: SENTINEL1_GRD
  resolucion_m: 90        # resolución de proceso server-side
  umbral_db: -18.0        # sigma0 VV bajo esto = agua
  hand_max_filtro_m: 30   # descarta detecciones altas sobre el drenaje (sombra radar)

escenarios:
  extremo_200mm:
    precipitacion_mm: 200
    horas: 72
    isoterma0_m: 3200
  moderado_100mm:
    precipitacion_mm: 100
    horas: 72
    isoterma0_m: 2800
  costero_120mm:
    precipitacion_mm: 120
    horas: 72
    isoterma0_m: 3000

calibracion:
  # Único evento con huella MODIS observada sobre Coquimbo en el Global Flood
  # Database v1.4 (barrido completo del catálogo: los eventos de marzo 2015 y
  # mayo 2017 no fueron procesados por GFD). DFO 2042 = tormenta frontal del
  # 24-29 de agosto de 2002 (Illapel, Salamanca, Ovalle, La Serena).
  # precipitacion_mm: acumulado de evento representativo según registros
  # DMC/DGA publicados; ajustable si se dispone de CR2MET local.
  eventos:
    - nombre: agosto_2002
      fuente: gfd
      inicio: "2002-08-24"
      fin: "2002-08-29"
      precipitacion_mm: 90
      isoterma0_m: 2500
    # Eventos con máscara de agua Sentinel-1 (openEO/CDSE). La ventana se
    # extiende unos días tras el peak para capturar la pasada del satélite.
    - nombre: marzo_2015
      fuente: sentinel1
      inicio: "2015-03-25"
      fin: "2015-04-04"
      precipitacion_mm: 70
      isoterma0_m: 3800
    - nombre: mayo_2017
      fuente: sentinel1
      inicio: "2017-05-11"
      fin: "2017-05-20"
      precipitacion_mm: 110
      isoterma0_m: 2600
  # rango de búsqueda del factor de volumen por subcuenca
  factor_min: 0.05
  factor_max: 8.0
  csi_objetivo: 0.3

exposicion:
  # consultas OSM sobre las zonas proyectadas
  vias: ["motorway", "trunk", "primary", "secondary", "tertiary", "residential"]
  servicios: ["hospital", "clinic", "school", "fire_station", "police"]
  # overpass-api.de banea tras consultas masivas; usar espejo por defecto
  overpass_endpoint: "https://overpass.kumi.systems/api"
